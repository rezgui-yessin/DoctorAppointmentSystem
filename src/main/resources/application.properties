# === Server ===
server.port=8083

# === Datasource (PostgreSQL - default profile) ===
spring.datasource.url=jdbc:postgresql://localhost:5432/doctor_appointment_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# === JWT ===
# Base64-encoded secret. Generate your own for production, e.g.:
# openssl rand -base64 64
jwt.secret=c29tZS1zdXBlci1zZWNyZXQta2V5LWZvci1kb2N0b3ItYXBwb2ludG1lbnQtc3lzdGVtLWNoYW5nZS1tZQ==
jwt.expiration-ms=86400000

# === Swagger ===
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# === Email Configuration (Dummy for testing) ===
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=user
spring.mail.password=pass
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
